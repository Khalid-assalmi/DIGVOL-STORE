<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGVOL STORE / Product information</title>
    <link rel="stylesheet" href="datas.style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/all.min.css">
</head>
<body dir="rtl">
    <div class="back"><a onclick="window.history.go(-1)"><i class="fas fa-arrow-right"></i></a></div>
    <div class="productDatas">
        <div class="productImage"></div>
       <div class="productInfo">
            <div class="productName"></div>
            <div class="description">
                <span id="text">الوصف:</span>
                <span id="productDes"></span>
                <hr/>
                <span class="info" id="DeliveryLocation">موقع التوصيل: </span>
                <hr/>
                <span class="info" id="Manufacturer">الشركة المصنعة: </span>
                <hr/>
                <span class="info" id="specs"></span>
            </div>
       </div>
    </div>
    <div class="cartBtns">
        <button id="goToCart" title="السلة"><i class="fa fa-shopping-cart"></i></button>
        <button onclick="addToCart(sessionStorage.getItem('index'))" id="addToCart" title="إضافة إلى السلة">إضافة للسلة<i class="fa-solid fa-cart-plus"></i></button>
    </div>
    <script src="script.js"></script>
    <script src="ShoppingCart.js"></script>
</body>
</html>
